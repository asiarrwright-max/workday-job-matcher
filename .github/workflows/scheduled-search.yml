name: Workday Job Matcher

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run matcher
        run: python workday_job_matcher.py --config config.yml

      - name: Upload matches
        uses: actions/upload-artifact@v4
        with:
          name: job-matches
          path: output/
